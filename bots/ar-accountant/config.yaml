bot_id: ar-accountant
name: ContadorAR
tagline: "Tu asesor contable e impositivo con inteligencia artificial para Argentina"

country:
  code: AR
  name: Argentina
  language: es-AR
  timezone: America/Argentina/Buenos_Aires
  currency: ARS

niche:
  type: accountant
  category: financial
  requires_disclaimer: true
  disclaimer_type: financial_not_advice

llm:
  free_tier: gemini-2.0-flash
  paid_tier: gpt-4o-mini
  fallback: ollama/llama3.2:3b
  max_context_tokens: 4096
  temperature: 0.3
  knowledge_base: "knowledge/"

pricing:
  free:
    questions_per_day: 3
    features: ["basic_answers"]
  basic:
    price_usd: 9
    price_local: 9000
    questions_per_day: 30
    features: ["basic_answers", "document_templates", "chat_history"]
  pro:
    price_usd: 19
    price_local: 19000
    questions_per_day: unlimited
    features: ["all", "document_upload", "priority", "api_access"]

payment:
  stripe: false
  local_providers: ["mercado_pago"]
  telegram_stars: true

telegram:
  bot_token: "${AR_ACCOUNTANT_BOT_TOKEN}"
  bot_username: "ContadorAR_bot"
  welcome_message: |
    🇦🇷 ¡Hola! Soy ContadorAR, tu asesor contable e impositivo con IA para Argentina.
    Puedo ayudarte con Monotributo, Ganancias, IVA, AFIP/ARCA, autónomos,
    sueldos y obligaciones fiscales de empresas y emprendedores argentinos.

    💰 Importante: Soy una IA informativa. Mis respuestas no reemplazan
    la consulta con un contador matriculado en el FACPCE/CPCECABA.

    ¡Preguntame lo que necesités! 👇

website:
  domain: "smarthelp.ai/ar/accountant"
  template: "chat-landing"
  primary_color: "#74ACDF"
  secondary_color: "#F6B40E"

seo:
  title: "ContadorAR - Asesor Contable con IA para Argentina"
  description: "Consulta contable e impositiva gratuita con IA. Monotributo, Ganancias, IVA, AFIP/ARCA. Ayuda para autónomos y pequeñas empresas argentinas."
  keywords: ["contador ia argentina", "monotributo consulta", "afip arca impuestos", "ganancias iva argentina", "autónomo argentina"]

marketing:
  target_groups:
    - "telegram: grupos de emprendedores y autónomos argentina"
    - "facebook: monotributistas, comerciantes argentina"
    - "reddit: r/argentina, r/asesorialegal"
  launch_offer: "7 días gratis del plan Basic"
