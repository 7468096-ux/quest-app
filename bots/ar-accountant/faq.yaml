bot_id: ar-accountant
language: es-AR

faq:
  - question: "¿Cuánto pago por mes en Monotributo?"
    answer: |
      💡 Depende de tu **categoría**, que se determina por tus ingresos brutos anuales:

      📊 **Categorías más usadas (valores 2025 aproximados):**
      - 🔹 Cat. A: hasta ~$3.700.000/año → ~$8.500/mes
      - 🔹 Cat. B: hasta ~$5.500.000/año → ~$10.200/mes
      - 🔹 Cat. C: hasta ~$7.700.000/año → ~$12.800/mes
      - 🔹 Cat. D: hasta ~$10.700.000/año → ~$15.500/mes
      - 🔹 Cat. E–K: mayores ingresos, cuotas más altas

      La cuota incluye **componente impositivo + jubilación + obra social**.

      📅 Vence el **día 20 de cada mes** (podés pagar en bancos, cajeros o con débito automático).

      ⚠️ Los valores se actualizan periódicamente por AFIP/ARCA. Verificá en [afip.gob.ar](https://www.afip.gob.ar).

      💰 *Aviso: Soy una IA informativa. Consultá con un contador para datos exactos actualizados.*

  - question: "¿Cuándo tengo que recategorizarme en el Monotributo?"
    answer: |
      📅 La **recategorización** en Monotributo se hace **dos veces al año**:
      - **Enero:** con los ingresos de julio a diciembre del año anterior
      - **Julio:** con los ingresos de enero a junio del año en curso

      📊 **¿Cuándo subir de categoría?**
      Si tus ingresos brutos de los últimos 12 meses superaron el tope de tu categoría actual → debés pasar a la siguiente.

      📉 **¿Cuándo bajar?**
      Si tus ingresos fueron menores al tope de una categoría inferior durante 6 meses consecutivos → podés recategorizarte hacia abajo.

      🛠️ **¿Cómo hacerlo?**
      1. Entrá a [afip.gob.ar](https://www.afip.gob.ar) con Clave Fiscal
      2. Servicios → Monotributo → Recategorización
      3. Completá los datos y confirmá

      ⚠️ No recategorizarte a tiempo puede generar deudas e intereses.

      💰 *Aviso: Soy una IA informativa. Consultá con un contador para asesoramiento personalizado.*

  - question: "¿Cómo calculo el aguinaldo (SAC)?"
    answer: |
      💼 El **Sueldo Anual Complementario (SAC)** se paga en dos cuotas:
      - **1° cuota:** hasta el 30 de junio
      - **2° cuota:** hasta el 31 de diciembre

      📐 **Fórmula:**
      > SAC = Mejor remuneración mensual del semestre ÷ 2

      📌 **Ejemplo:**
      - Mejor sueldo en el semestre: $500.000
      - SAC = $500.000 ÷ 2 = **$250.000**

      📉 **Proporcional (si entraste o salís durante el semestre):**
      > SAC proporcional = (Mejor sueldo × días trabajados en el semestre) ÷ 180

      ⚠️ Sobre el SAC se calculan **cargas sociales** de la misma manera que sobre el sueldo mensual.

      💰 *Aviso: Soy una IA informativa. Para liquidaciones de sueldos, consultá con un contador o estudio contable.*

  - question: "¿Cuánto es la indemnización por despido sin causa?"
    answer: |
      ⚖️ La indemnización por **despido sin causa** en Argentina se calcula según el **Art. 245 de la LCT (Ley 20.744)**:

      📐 **Fórmula:**
      > Indemnización = Mejor remuneración mensual normal y habitual × Años de antigüedad

      📌 **Reglas:**
      - Mínimo: 1 mes de sueldo (aunque tengas menos de 1 año)
      - La base de cálculo tiene un **tope** equivalente a 3 veces el promedio de los salarios del CCT aplicable
      - La antigüedad se cuenta por año o fracción mayor a 3 meses

      📌 **Ejemplo:**
      - Sueldo: $600.000/mes
      - Antigüedad: 3 años y 5 meses → se cuentan **3,5 años** (fracción > 3 meses)
      - Indemnización = $600.000 × 3,5 = **$2.100.000**

      ⚠️ Además pueden corresponder: preaviso, integración del mes de despido, SAC proporcional, vacaciones proporcionales.

      💰 *Aviso: Soy una IA informativa. Para casos de despido, consultá con un abogado laboralista o contador.*

  - question: "¿Cuándo me conviene pasar del Monotributo al Régimen General?"
    answer: |
      📊 **Pasás al Régimen General (obligatoriamente) cuando:**
      - Superás el tope de la **categoría K** de Monotributo (~$68.000.000/año en 2025)
      - Superás el límite de **3 empleados en relación de dependencia**
      - Tenés más de **3 locales/establecimientos**

      💡 **¿Cuándo conviene voluntariamente?**
      - Tus clientes son **empresas que necesitan factura con IVA discriminado**
      - Tenés **gastos altos** que podés deducir en Ganancias
      - Planeás contratar **empleados en blanco**
      - Tus ingresos reales justifican el costo del régimen

      💼 **En Régimen General pagás:**
      - IVA: declaración mensual, alícuota 21%
      - Ganancias: pagos a cuenta + declaración anual
      - Autónomos: aportes previsionales fijos por categoría
      - IIBB: según actividad y provincia

      ⚠️ El Régimen General tiene mayor carga administrativa. Es fundamental tener un contador.

      💰 *Aviso: Soy una IA informativa. Consultá con un contador para evaluar qué régimen te conviene más.*

  - question: "¿Qué es el IIBB y cómo se paga?"
    answer: |
      🏢 **Ingresos Brutos (IIBB)** es un impuesto **provincial** que grava la actividad económica habitual. Lo administra cada provincia (ARBA en Buenos Aires, AGIP en CABA, etc.).

      📊 **Alícuotas más comunes:**
      - Comercio minorista: 3% aprox.
      - Servicios: 3-5% aprox.
      - Actividades promovidas (algunos servicios profesionales): alícuotas reducidas o exenciones

      📅 **Vencimiento:** generalmente mensual (según provincia y categoría)

      🗺️ **Si tenés actividad en más de una provincia → Convenio Multilateral:**
      - Se distribuyen los ingresos entre provincias según coeficientes de ingresos y gastos
      - Declaración mensual (CM03) y anual (CM05) en [sifere.gov.ar](https://www.sifere.gov.ar)

      🛠️ **¿Cómo pagar?**
      - CABA: [agip.gob.ar](https://www.agip.gob.ar) → SIRCREB, VEP
      - PBA: [arba.gob.ar](https://www.arba.gob.ar) → Mis Declaraciones Juradas
      - Otras provincias: plataformas propias de RENTAS o DIRECCIÓN GENERAL DE RENTAS

      ⚠️ Monotributistas: en general están exentos de IIBB o tienen alícuota reducida dependiendo la provincia.

      💰 *Aviso: Soy una IA informativa. Consultá con un contador para determinar tu situación específica en IIBB.*
