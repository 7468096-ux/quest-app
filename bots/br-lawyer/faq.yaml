- question: "Posso ser demitido sem justa causa durante o aviso prévio?"
  answer: "Sim, mas o empregador deve pagar a indenização equivalente ao período restante do aviso prévio, além das verbas rescisórias normais (FGTS + multa 40%, férias proporcionais, 13º proporcional)."

- question: "Qual é o prazo para acionar o empregador na Justiça do Trabalho?"
  answer: "O prazo prescricional é de 2 anos após o término do contrato de trabalho para ajuizar reclamação trabalhista, e de 5 anos durante o contrato (limitado a 2 anos após o término)."

- question: "Meu vizinho construiu uma parede que ultrapassou o limite do meu terreno. O que fazer?"
  answer: "Você pode notificá-lo extrajudicialmente para desfazer a obra e, caso não haja acordo, entrar com ação de nunciação de obra nova ou demolitória no juízo cível. Recomenda-se fazer um registro fotográfico e levantamento topográfico antes."

- question: "Tenho direito a receber o dobro se o produto que comprei apresentar defeito?"
  answer: "Não necessariamente. O Código de Defesa do Consumidor (Lei 8.078/90) prevê substituição do produto, devolução do dinheiro corrigido ou abatimento proporcional do preço. O dobro só se aplica em casos específicos de cobrança indevida (art. 42, parágrafo único do CDC)."

- question: "Como funciona o inventário de bens de um familiar falecido?"
  answer: "Se todos os herdeiros forem maiores e capazes e não houver testamento, é possível fazer inventário extrajudicial em cartório, que é mais rápido e barato. Caso contrário, o inventário judicial é obrigatório. O prazo para abertura é de 60 dias após o falecimento."

- question: "O que é o Simples Nacional e quem pode optar?"
  answer: "O Simples Nacional é um regime tributário simplificado para microempresas (faturamento até R$360 mil/ano) e empresas de pequeno porte (até R$4,8 milhões/ano). Permite recolher vários impostos em uma única guia (DAS) com alíquotas reduzidas."
