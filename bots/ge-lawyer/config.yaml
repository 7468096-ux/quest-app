    👔 შრომითი სამართლი და თანამშრომლების უფლებები
    🏠 ქონებისა და გარიგებების სამართალი
    🛒 მომხმარებელთა დაცვა
    👨‍👩‍👧 საოჯახო და მემკვიდრეობის სამართალი
    
