faq:
  - id: "termination_notice"
    question_ka: "დამსაქმებელმა შეტყობინება გამომიგზავნა სამსახურიდან გათავისუფლების შესახებ — რა ჩემი უფლებებია?"
    question_ru: "Работодатель прислал уведомление об увольнении — каковы мои права?"
    question_en: "My employer sent me a termination notice — what are my rights?"
    answer_ru: |
      По Трудовому кодексу Грузии (статья 38):
      
      📋 **Ваши права при увольнении:**
      ✅ Уведомление за 30 дней (или 45 дней, если стаж > 3 лет)
      ✅ Выходное пособие: 1 месячный оклад за каждый полный год работы (минимум 1 месяц)
      ✅ Все неиспользованные отпускные дни должны быть выплачены
      ✅ Полный расчёт в день увольнения
      
      ⚠️ **Незаконное увольнение:** если нарушены сроки или основания — обратитесь в Инспекцию труда (inspection.gov.ge, тел. 1505) или суд. Компенсация: 3 месячных оклада + восстановление.
      
      📞 **Куда обратиться:** Инспекция труда → 1505

  - id: "consumer_return"
    question_ka: "მაღაზიამ უარი მითხრა ნივთის დაბრუნებაზე — შემიძლია ბრძოლა?"
    question_ru: "Магазин отказал в возврате товара — могу ли я настаивать?"
    question_en: "A store refused to accept a return — can I fight this?"
    answer_ru: |
      По закону Грузии «О защите прав потребителей» (2012):
      
      📋 **Ваши права:**
      ✅ **Бракованный товар**: право на ремонт, замену или возврат денег — ВСЕГДА, независимо от политики магазина
      ✅ **Гарантия**: 2 года на все товары (если производитель не указал больше)
      ✅ **Дистанционная покупка** (интернет): 14 дней на возврат без объяснений
      
      ✅ **Что делать:**
      1. Напишите претензию в магазин письменно (2 экземпляра)
      2. Если отказали — жалоба в NACC: nacc.gov.ge или тел. 1513
      3. NACC проводит расследование бесплатно
      
      📞 **NACC**: 1513 | nacc.gov.ge

  - id: "apartment_rental"
    question_ka: "მეიჯარემ გამაძევა ბინიდან ყოველგვარი გაფრთხილების გარეშე — ეს კანონიერია?"
    question_ru: "Арендодатель выселил меня без предупреждения — это законно?"
    question_en: "My landlord evicted me without notice — is this legal?"
    answer_ru: |
      По Гражданскому кодексу Грузии (статьи 531-560):
      
      📋 **Права арендатора:**
      ✅ Уведомление за 30 дней при расторжении договора (если в договоре не указано иное)
      ✅ Принудительное выселение ТОЛЬКО через суд — самовольное выселение незаконно
      ✅ Залог должен быть возвращён в течение 30 дней после выезда (за вычетом доказанного ущерба)
      
      🚫 **Что нельзя арендодателю без суда:**
      - Менять замки
      - Выносить ваши вещи
      - Отключать коммунальные услуги
      
      ✅ **Что делать:**
      1. Сфотографируйте состояние квартиры при въезде/выезде
      2. Если выселили незаконно — заявление в полицию (112)
      3. Иск в суд о восстановлении владения (срочно — 7 дней)
      
      📞 **Полиция**: 112 | **Суд**: court.ge

  - id: "company_registration"
    question_ka: "როგორ დავარეგისტრირო შპს საქართველოში?"
    question_ru: "Как зарегистрировать ООО (შპს) в Грузии?"
    question_en: "How to register an LLC (შპს) in Georgia?"
    answer_ru: |
      По закону «О предпринимателях» Грузии регистрация შпს:
      
      📋 **Что нужно:**
      ✅ 1 или более учредителей (физ. или юр. лица любой страны)
      ✅ Устав (можно использовать типовой)
      ✅ Юридический адрес в Грузии
      ✅ Минимальный уставный капитал: 0 ₾ (не установлен)
      
      ✅ **Процесс (1-3 рабочих дня):**
      1. Подать заявку онлайн: napr.gov.ge (раздел «Предприниматели»)
      2. Или через Дом юстиции (Justice House) лично
      3. Оплата: 100 ₾ (стандарт) или 200 ₾ (1 день)
      4. Получить выписку из реестра (УНН — Идентификационный номер)
      5. Открыть банковский счёт (TBC / Bank of Georgia)
      
      💡 **Налоги для малого бизнеса:**
      - Оборот < 500,000 ₾/год → статус "малый бизнес" → 1% с оборота
      - IT-компании → Virtual Zone (0% корпоративный налог)
      
      📞 **NAPR**: napr.gov.ge | 2 405 405

  - id: "inheritance"
    question_ka: "ნათესავი გარდაიცვალა — რა ვადაში უნდა მივიღო მემკვიდრეობა?"
    question_ru: "Умер родственник — в какой срок нужно принять наследство?"
    question_en: "A relative died — what is the deadline to accept inheritance?"
    answer_ru: |
      По Гражданскому кодексу Грузии (статья 1421-1430):
      
      📋 **Срок принятия наследства: 6 месяцев** с даты смерти
      
      ✅ **Порядок наследования по закону (без завещания):**
      1. **Очередь 1**: дети, супруг/а, родители
      2. **Очередь 2**: братья, сёстры, дедушки/бабушки
      3. **Очередь 3**: дяди, тёти
      
      ✅ **Что делать:**
      1. Обратиться к нотариусу в течение 6 месяцев (notary.ge)
      2. Документы: свидетельство о смерти, документы родства, ID
      3. Нотариус запрашивает реестр (недвижимость, банки)
      4. Через 6 мес. после подачи — получить свидетельство о наследстве
      
      ⚠️ **Пропустили срок?** Можно восстановить через суд, если были уважительные причины
      
      📞 **Нотариусы**: notary.ge

  - id: "labor_discrimination"
    question_ka: "სამსახურში დისკრიმინაცია მაქვს — სად ჩავიჩივლო?"
    question_ru: "На работе меня дискриминируют — куда жаловаться?"
    question_en: "I'm being discriminated against at work — where can I complain?"
    answer_ru: |
      По Трудовому кодексу Грузии (статья 2) и Закону «О ликвидации всех форм дискриминации» (2014):
      
      📋 **Запрещённые основания дискриминации (19 оснований):**
      Раса, пол, возраст, инвалидность, сексуальная ориентация, религия, политические взгляды, национальность, гражданство, имущественное положение и др.
      
      ✅ **Что делать:**
      1. **Зафиксируйте**: скрины переписки, свидетели, письменные доказательства
      2. **Инспекция труда**: inspection.gov.ge | тел. 1505 (бесплатная жалоба, срок проверки 30 дней)
      3. **Народный защитник (Омбудсмен)**: ombudsman.ge | проверяет нарушения Закона о дискриминации
      4. **Суд**: иск о компенсации морального ущерба (минимум 1,000 ₾)
      
      💡 **Важно**: при дискриминации **работодатель должен доказать** отсутствие дискриминации (обратное бремя доказывания — статья 6 Закона 2014 г.)
      
      📞 **Омбудсмен**: ombudsman.ge | 116 006
