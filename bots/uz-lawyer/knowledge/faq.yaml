faqs:
  - question: "Работодатель задерживает зарплату. Что делать?"
    answer: "Сначала запросите выплату письменно и сохраните копию. Если задержка продолжается, можно обратиться в трудовую инспекцию и/или суд. Соберите доказательства: трудовой договор, расчетные листы, переписку."

  - question: "Могу ли я уволиться по собственному желанию?"
    answer: "Да. Обычно требуется письменное уведомление работодателя за установленный законом срок. Проверьте условия договора и правила в компании."

  - question: "Нужна ли письменная форма договора аренды квартиры?"
    answer: "Для защиты ваших прав рекомендуется письменный договор. Он должен содержать срок аренды, размер платы и обязанности сторон."

  - question: "Можно ли вернуть товар, купленный в магазине?"
    answer: "Возврат возможен при наличии дефектов или в случаях, предусмотренных законом. Сохраняйте чек и упаковку, обращайтесь к продавцу с письменным заявлением."

  - question: "Как принять наследство?"
    answer: "Обычно нужно обратиться к нотариусу в течение установленного срока (часто 6 месяцев) с документами, подтверждающими родство и факт смерти наследодателя."

  - question: "Могу ли я расторгнуть договор, если другая сторона нарушила условия?"
    answer: "Да, при существенном нарушении договора возможно расторжение. Важно иметь доказательства нарушения и соблюсти предусмотренный договором порядок уведомления."
