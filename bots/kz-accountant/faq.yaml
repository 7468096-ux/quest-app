bot_id: "kz-accountant"
faq:
  - question: "Какой налог платит ИП на упрощённой декларации?"
    answer: |
      📋 ИП на упрощённой декларации (форма 910) платит:

      💰 Ставка: **3% от выручки** (полученного дохода)
      📅 Периодичность: 2 раза в год:
      - За первое полугодие — до **15 августа**
      - За второе полугодие — до **15 февраля** следующего года

      ✅ Условия применения упрощёнки:
      - Доход за полугодие не более **24 038 МРП** (~94 млн тг в 2026)
      - Среднесписочная численность — не более **30 человек**

      👷 Дополнительно с зарплаты сотрудников:
      - ОПВ: 10%, ОСМС: 3%, СО: 3,5%, СН: 9,5%
      - Форма 200 — ежеквартально до 15-го числа

      Сумма налога делится поровну: половину платит ИП, половину удерживается с дохода работника (в ряде случаев ИП платит и за себя как за физлицо).

      💰 Дисклеймер: Проконсультируйтесь с бухгалтером для точных расчётов под вашу ситуацию.

  - question: "Когда нужно регистрироваться плательщиком НДС?"
    answer: |
      🏛 Обязательная регистрация по НДС:

      Вы ОБЯЗАНЫ встать на учёт по НДС, если ваш оборот за **12 последовательных месяцев** превысил **20 000 МРП**.

      📊 В 2026 году: 20 000 × 3 932 = **78 640 000 тенге** (~172 000 USD)

      📋 Как встать на учёт:
      1. Подать заявку через cabinet.salyk.kz
      2. Срок — в течение 10 рабочих дней после превышения порога

      📅 Отчётность после регистрации:
      - Форма 300 (декларация по НДС): ежеквартально до **15-го числа** второго месяца, следующего за кварталом
      - Ставка НДС: **12%** (на экспорт — 0%)

      ⚠️ Добровольная постановка на учёт по НДС тоже возможна — даёт право на зачёт входящего НДС от поставщиков.

      💰 Уточните детали у бухгалтера или на kgd.gov.kz.

  - question: "Сколько платить работнику на руки, если зарплата 200 000 тенге?"
    answer: |
      👷 Расчёт зарплаты сотрудника (брутто 200 000 тенге):

      **Удержания с работника:**
      | Удержание | Ставка | Сумма |
      |-----------|--------|-------|
      | ОПВ | 10% | −20 000 тг |
      | ОСМС | 2% | −4 000 тг |
      | ИПН (с вычетом ОПВ+ОСМС) | 10% | −(200 000−20 000−4 000)×10% = −17 600 тг |
      | **На руки** | | **≈ 158 400 тг** |

      **Отчисления работодателя (сверху зарплаты):**
      | Отчисление | Ставка | Сумма |
      |------------|--------|-------|
      | СО | 3,5% | 7 000 тг |
      | ОСМС (работодатель) | 3% | 6 000 тг |
      | Социальный налог | 9,5% − СО | ≈ 12 000 тг |

      💡 Итого работодатель тратит ~225 000 тг на сотрудника с зарплатой 200 000 тг.

      💰 Точные расчёты зависят от применяемых вычетов — проконсультируйтесь с бухгалтером.

  - question: "Как зарегистрировать ИП в Казахстане?"
    answer: |
      🏢 Регистрация ИП в Казахстане:

      **Онлайн через eGov.kz (рекомендуется):**
      1. Зайти на egov.kz → «Для бизнеса» → «Регистрация ИП»
      2. Авторизоваться через ЭЦП или SMS
      3. Заполнить форму: ФИО, ИИН, вид деятельности (ОКЭД)
      4. Подписать заявление ЭЦП
      5. Срок рассмотрения: **1 рабочий день**
      6. Свидетельство получаете в электронном виде — бесплатно

      **Через ЦОН (Центр обслуживания населения):**
      - Паспорт/удостоверение + ИИН
      - Заявление на регистрацию
      - Срок: 1 рабочий день, пошлина не взимается

      📋 После регистрации:
      - Выбрать налоговый режим (упрощённая декларация или общеустановленный)
      - Открыть расчётный счёт (необязательно для ИП без наёмных работников)
      - Зарегистрироваться в cabinet.salyk.kz

      💡 Для ОКЭД (вид деятельности) используйте поиск на stat.gov.kz

  - question: "Что такое ОСМС и сколько платить?"
    answer: |
      🏥 ОСМС — Обязательное социальное медицинское страхование

      ОСМС обеспечивает доступ к медицинскому обслуживанию через фонд ФСМС.

      **Ставки в 2026 году:**

      Для наёмных работников:
      - Работодатель: **3% от зарплаты** (ежемесячно)
      - Работник: **2% от зарплаты** (удерживается из зарплаты)

      Для ИП (самозанятых):
      - **5% от 1,4 × МЗП** ежемесячно
      - 2026: 5% × (1,4 × 85 000) = 5% × 119 000 = **5 950 тг/месяц**

      ⚠️ Без уплаты ОСМС бесплатная медпомощь ограничена экстренными случаями.

      📅 Срок уплаты: до **25-го числа** каждого месяца
      📋 Форма отчётности: 200.00 (ежеквартально)

      Проверить взносы: cabinet.salyk.kz → «Пенсионные и социальные взносы»

  - question: "Какие штрафы за несвоевременную подачу декларации?"
    answer: |
      ⚠️ Штрафы за налоговые нарушения в Казахстане (НК РК, ст. 272, КоАП):

      **Непредставление декларации в срок:**
      - Предупреждение (первый раз) или штраф
      - ИП: **15–30 МРП** (~59 000–118 000 тг)
      - Юрлица (ТОО/АО): **30–150 МРП** (~118 000–590 000 тг)

      **Пеня за несвоевременную уплату налога:**
      - **1,25×** официальная ставка рефинансирования НБ РК в год
      - Начисляется за каждый день просрочки

      **Занижение налоговой базы:**
      - 100% от недоплаченного налога (при повторном нарушении — 200%)

      📋 Сроки подачи (главные):
      - Форма 910 (ИП, упрощённая): до 15 августа и 15 февраля
      - Форма 100 (КПН): до 31 марта
      - Форма 200 (ИПН/СН): ежеквартально до 15-го
      - Форма 300 (НДС): ежеквартально до 15-го второго месяца

      💡 При наличии уважительных причин можно запросить продление срока через cabinet.salyk.kz

      💰 Для точных сумм штрафов и обжалования обращайтесь к бухгалтеру или налоговому консультанту.
