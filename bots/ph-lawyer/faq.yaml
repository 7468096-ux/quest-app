faq:
  - question: "What are my rights if I am illegally dismissed from work?"
    answer: |
      If you believe you were illegally dismissed, you have the following rights:

      • **Reinstatement** — be returned to your previous position (or an equivalent one)
      • **Full back wages** — payment of all wages from the time of dismissal until reinstatement
      • **Separation pay** — if reinstatement is not possible, you are entitled to separation pay

      **Steps to take:**
      1. Request a written notice explaining the reason for dismissal (required by law)
      2. File a complaint with the **NLRC (National Labor Relations Commission)** or **DOLE**
      3. Alternatively, seek free legal help from the **Public Attorney's Office (PAO)**

      ⚠️ You must file within **4 years** for money claims, but act quickly — evidence is time-sensitive.

  - question: "How much is the 13th month pay and who is entitled to it?"
    answer: |
      Under **Presidential Decree 851**, all rank-and-file employees who have worked for at least **one month** are entitled to 13th month pay.

      **Calculation:**
      > 13th Month Pay = (Total Basic Salary Earned for the Year) ÷ 12

      • Must be paid **on or before December 24** of each year
      • Exempt: government employees, managerial employees, domestic workers (Kasambahay), and those paid purely on commission

      **Example:** If your monthly basic salary is ₱18,000 and you worked 12 months:
      → 13th Month Pay = ₱18,000

      If you worked only 6 months: ₱18,000 × (6/12) = ₱9,000

  - question: "Can my landlord evict me without notice?"
    answer: |
      No. Under Philippine law and the **Rent Control Act (RA 9653)**, a landlord cannot evict you without proper notice and a valid legal reason.

      **Valid grounds for eviction:**
      • Non-payment of rent for **3 months**
      • Need of the property by the owner (for personal use or renovation)
      • Legitimate need to demolish/repair the structure
      • Expiration of the lease agreement

      **Process:**
      1. Written notice must be given at least **3 months** in advance
      2. If you refuse to vacate, the landlord must file an **ejectment case** in the Municipal Trial Court
      3. A landlord cannot forcibly remove you, change locks, or cut utilities — this is illegal

      💡 If your monthly rent is ₱10,000 or below (Metro Manila) or ₱5,000 (elsewhere), RA 9653 caps annual rent increases at **7%**.

  - question: "What is the process for legal separation or annulment in the Philippines?"
    answer: |
      The Philippines does not recognize divorce (except for Muslims under PD 1083). Options are:

      **1. Annulment** — declares the marriage void from the beginning
      • Grounds: lack of parental consent (if under 21), psychological incapacity (Art. 36), fraud, impotence, STD
      • Filed in the **Regional Trial Court (Family Court)**
      • Process typically takes **3–6 years** and costs ₱200,000–₱500,000+

      **2. Legal Separation** — spouses live apart but remain legally married
      • Grounds: repeated physical violence, drug addiction, infidelity, attempt on life of spouse/child
      • Does NOT allow remarriage

      **3. Declaration of Nullity** — for void marriages (e.g., bigamy, underage without parental consent)

      💡 For OFWs or low-income individuals, the PAO provides free assistance with family law cases.

  - question: "What are my rights as a consumer if a product is defective?"
    answer: |
      Under the **Consumer Act of the Philippines (RA 7394)**, you have the right to:

      • **Replacement** of the defective product
      • **Repair** at no cost (if under warranty)
      • **Refund** of the purchase price
      • **Damages** if the defect caused injury or loss

      **Steps to file a complaint:**
      1. Return the product to the seller with your receipt/proof of purchase
      2. If the seller refuses, file a complaint with **DTI** (1-DTI hotline: 1-384)
      3. For e-commerce purchases, DTI also handles online seller complaints
      4. You can also file at your **Barangay** for small disputes

      ⏰ File complaints within the warranty period (usually 1 year for electronics, 6 months for other goods).

  - question: "What happens if I am arrested? What are my rights?"
    answer: |
      Under the **Philippine Constitution (Article III — Bill of Rights)**, if you are arrested you have the right to:

      • **Right to remain silent** — you are not required to answer questions
      • **Right to counsel** — you have the right to a lawyer; if you cannot afford one, the PAO will provide one free
      • **Miranda Rights** — police must inform you of these rights upon arrest
      • **Right against unreasonable search and seizure** — police generally need a warrant
      • **Right to bail** — except for heinous crimes (e.g., murder, rape, drug trafficking under RA 9165)

      **What to do:**
      1. Do NOT resist arrest physically
      2. State clearly: *"I invoke my right to remain silent and my right to counsel"*
      3. Contact a family member or lawyer immediately
      4. If you cannot afford a lawyer, contact the **PAO** or the **IBP Legal Aid office**

      ⚠️ Warrantless arrests are valid only if: (a) caught in the act, (b) when an offense has just been committed and the officer has probable cause, or (c) the person is an escaped prisoner.
