faq:
  - question: "Меня уволили без предупреждения. Что делать?"
    answer: |
      📋 По Трудовому кодексу РК (ст. 52-54), работодатель обязан:
      • Предупредить об увольнении за 1 месяц (сокращение штата) или за 3 дня (ликвидация)
      • Выплатить все задолженности по зарплате в день увольнения
      • Выдать трудовую книжку в день увольнения
      
      **Если уволили незаконно:**
      1. Попросите объяснить причину в письменной форме
      2. Обратитесь в Комитет труда РК с жалобой
      3. Подайте иск в суд о восстановлении на работе (срок — 3 месяца с момента увольнения)
      
      ⚖️ *Информационный ответ. Обратитесь к юристу для защиты ваших прав.*

  - question: "Как вернуть товар ненадлежащего качества?"
    answer: |
      🛍 По Закону РК «О защите прав потребителей», у вас есть следующие права:
      
      **Если товар бракованный:**
      • В течение **14 дней** — обмен или возврат без объяснения причин
      • В период **гарантийного срока** — бесплатный ремонт или замена
      • Если продавец отказывает — направьте письменную претензию
      
      **Куда жаловаться:**
      1. Комитет по защите прав потребителей: kzrp.gov.kz
      2. Прокуратура (системные нарушения)
      3. Суд (компенсация ущерба)
      
      ⚖️ *Информационный ответ. Для составления претензии обратитесь к юристу.*

  - question: "Как правильно оформить трудовой договор?"
    answer: |
      📄 По ТК РК (ст. 28-33), трудовой договор должен содержать:
      
      **Обязательные пункты:**
      • ФИО работника и реквизиты работодателя
      • Должность и место работы
      • Дата начала работы и срок договора (если срочный)
      • Размер зарплаты и порядок выплаты
      • Режим рабочего времени и отдыха
      • Социальные гарантии (отпуск минимум 24 дня)
      
      **Важно:**
      • Договор — в 2 экземплярах, подписывается обеими сторонами
      • Ваш экземпляр остаётся у вас
      • Изменения вносятся только в письменном дополнительном соглашении
      
      ⚖️ *Информационный ответ. Для проверки конкретного договора — к юристу.*

  - question: "Что такое ИП в Казахстане и как его открыть?"
    answer: |
      💼 ИП (Индивидуальный предприниматель) — самая простая форма бизнеса в РК.
      
      **Виды налогообложения для ИП:**
      • **Специальный налоговый режим (СНР)** — 1% от дохода (упрощённый)
      • **Патент** — фиксированная сумма, для небольшого бизнеса
      • **Общеустановленный режим** — ИПН 10% + соцвзносы
      
      **Как открыть:**
      1. Зайти на egov.kz → «Регистрация ИП»
      2. ЭЦП (электронная цифровая подпись) — получить в ЦОН
      3. Заполнить заявление онлайн — бесплатно, 1 день
      
      **Ежемесячные обязательства:**
      • ОПВ (пенсионные взносы) — 10% от дохода
      • ВОСМС (медицина) — 5% от 1.4 МЗП
      • Налог по выбранному режиму
      
      ⚖️ *Информационный ответ. Для конкретного расчёта — к бухгалтеру.*

  - question: "Как разделить имущество при разводе?"
    answer: |
      🏠 По Кодексу РК «О браке и семье» (ст. 36-38):
      
      **Совместное имущество** (делится поровну):
      • Всё, купленное в браке: квартира, машина, техника
      • Зарплаты и доходы во время брака
      • Бизнес, открытый в браке
      
      **Личное имущество** (не делится):
      • Полученное до брака
      • Наследство или подарок (даже в браке)
      • Личные вещи и инструменты для работы
      
      **Как разделить:**
      1. **Мировое соглашение** — договориться самостоятельно (нотариально заверить)
      2. **Суд** — если договориться не получается (3 года с момента развода)
      
      ⚖️ *Информационный ответ. Раздел имущества — сложный процесс, обратитесь к юристу.*

  - question: "Меня задержала полиция. Каковы мои права?"
    answer: |
      🚔 По Конституции РК и УПК РК, при задержании вы имеете право:
      
      **Немедленно:**
      • Знать причину задержания
      • Не давать показания против себя (ст. 77 Конституции)
      • Немедленно позвонить родственникам или адвокату
      
      **В течение 3 часов:**
      • Вам обязаны разъяснить ваши права
      • Составить протокол задержания (требуйте копию!)
      
      **Максимальный срок задержания без суда:**
      • 72 часа — после этого суд должен санкционировать арест или отпустить
      
      **Если права нарушены:**
      • Фиксируйте всё (свидетели, видео)
      • Жалоба прокурору или в суд
      • Обратитесь к адвокату как можно скорее
      
      ⚖️ *Информационный ответ. При задержании — немедленно связывайтесь с адвокатом.*
