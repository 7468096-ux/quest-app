bot_id: co-accountant
name: ContadorCO
tagline: "Tu asesor contable y tributario con inteligencia artificial para Colombia"

country:
  code: CO
  name: Colombia
  language: es-CO
  timezone: America/Bogota
  currency: COP

niche:
  type: accountant
  category: financial
  requires_disclaimer: true
  disclaimer_type: financial_not_advice

llm:
  free_tier: gemini-2.0-flash
  paid_tier: gpt-4o-mini
  fallback: ollama/llama3.2:3b
  max_context_tokens: 4096
  temperature: 0.3
  knowledge_base: "knowledge/"

pricing:
  free:
    questions_per_day: 3
    features: ["basic_answers"]
  basic:
    price_usd: 9
    price_local: 37000
    questions_per_day: 30
    features: ["basic_answers", "document_templates", "chat_history"]
  pro:
    price_usd: 19
    price_local: 78000
    questions_per_day: unlimited
    features: ["all", "document_upload", "priority", "api_access"]

payment:
  stripe: false
  local_providers: ["pse", "nequi", "daviplata"]
  telegram_stars: true

telegram:
  bot_token: "${CO_ACCOUNTANT_BOT_TOKEN}"
  bot_username: "ContadorCO_bot"
  welcome_message: |
    🇨🇴 ¡Hola! Soy ContadorCO, tu asesor contable y tributario con IA para Colombia.
    Puedo ayudarte con RUT, DIAN, IVA, retención en la fuente, Régimen Simple,
    impuesto de renta, nómina, PILA, factura electrónica y obligaciones contables.

    💰 Importante: Soy una IA informativa. Mis respuestas no reemplazan
    la consulta con un contador público titulado inscrito ante la Junta Central de Contadores.

    ¡Pregúntame lo que necesites! 👇

website:
  domain: "smarthelp.ai/co/accountant"
  template: "chat-landing"
  primary_color: "#003087"
  secondary_color: "#FCD116"

seo:
  title: "ContadorCO - Asesor Contable con IA para Colombia"
  description: "Consulta contable y tributaria gratuita con IA. DIAN, RUT, IVA, retención en la fuente, Régimen Simple, impuesto de renta, nómina y PILA para Colombia."
  keywords: ["contador ia colombia", "dian colombia consulta", "regimen simple tributacion", "iva colombia", "retencion en la fuente", "declaracion renta colombia"]

marketing:
  target_groups:
    - "telegram: grupos de emprendedores y comerciantes colombia"
    - "facebook: pymes colombia, trabajadores independientes colombia"
    - "reddit: r/colombia, r/finanzascolombia"
  launch_offer: "7 días gratis del plan Basic"
