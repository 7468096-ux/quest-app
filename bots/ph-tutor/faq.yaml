faqs:
  - question: "When is the UPCAT exam?"
    answer: |
      📅 The UPCAT (University of the Philippines College Admission Test) is typically held in **August to September** of the year before your target enrollment.

      For AY 2026–2027 admission:
      - Online application: around **May–June 2025**
      - Exam date: **August–September 2025**
      - Results release: **December 2025 – January 2026**

      Check the official UPCAT website at **upcat.up.edu.ph** for the exact schedule — dates change every year.

  - question: "What subjects are in the UPCAT?"
    answer: |
      📚 The UPCAT has **4 subtests**:

      1. **Language Proficiency** — Grammar, vocabulary, sentence completion, analogies
      2. **Reading Comprehension** — Understanding passages, inference, main idea
      3. **Mathematics** — Arithmetic, algebra, geometry, statistics (Grade 7–12 level)
      4. **Science** — Biology, Chemistry, Physics, Earth Science (integrated)

      📊 Total: approximately **240 items** | Duration: ~4 hours
      Your **UPG (University Predicted Grade)** is computed from these scores + your Grade 12 GWA.

  - question: "What is the difference between UPCAT and ACET?"
    answer: |
      🎓 Both are major Philippine college entrance exams, but for different universities:

      **UPCAT** (UP system):
      - 4 subtests: Language, Reading, Math, Science
      - Result: UPG (University Predicted Grade)
      - Applied to any UP campus

      **ACET** (Ateneo de Manila):
      - 5 subtests: English, Math, Science, Filipino, Abstract Reasoning
      - More emphasis on analytical thinking
      - Separate application per campus

      **Other top exams:**
      - DLSUCET — De La Salle University
      - USTET — University of Santo Tomas
      - AdMUAT — Adamson University

      💡 Tip: Take ALL exams you qualify for — more options = better chance of admission!

  - question: "What Math topics are in the UPCAT?"
    answer: |
      🔢 UPCAT Mathematics covers **Grade 7–12 curriculum**. Key topics:

      **Algebra:**
      - Linear equations and inequalities
      - Quadratic equations (factoring, quadratic formula)
      - Systems of equations
      - Polynomials and rational expressions
      - Functions and relations

      **Geometry:**
      - Properties of triangles, quadrilaterals, circles
      - Perimeter, area, volume formulas
      - Pythagorean theorem
      - Similar and congruent figures
      - Coordinate geometry

      **Statistics & Probability:**
      - Mean, median, mode, range
      - Basic probability
      - Permutations and combinations

      **Trigonometry (basic):**
      - SOH-CAH-TOA
      - Special angles (30°, 45°, 60°, 90°)

      💡 Focus on **word problems** — UPCAT loves real-life application problems!

  - question: "How do I pass the UPCAT? Any tips?"
    answer: |
      🎯 Here are proven strategies from past UPCAT passers:

      **Preparation (months before):**
      - Review all Grade 7–12 subjects systematically
      - Practice with past UPCAT-style questions daily
      - Focus on your weak subjects first, then maintain your strong ones

      **Reading Comprehension:**
      - Read actively — look for main idea, supporting details, author's tone
      - Practice reading science and social studies passages (UPCAT loves these)

      **Math:**
      - Memorize key formulas (area, volume, quadratic formula, trigonometry)
      - Practice mental math for speed
      - Show work — even if you get the final answer wrong, checking your steps helps

      **Science:**
      - Review basic biology (cells, genetics), chemistry (periodic table, reactions), physics (forces, energy), earth science (rock cycle, atmosphere)

      **Exam Day:**
      - ⚠️ No penalty for wrong answers — **NEVER leave blank!**
      - Manage time: ~1 minute per item
      - Skip hard questions, return to them later
      - Read ALL choices before selecting

  - question: "Can you teach me Filipino (Tagalog) grammar for ACET?"
    answer: |
      📖 Oo naman! (Of course!) Here's a quick review of key Filipino grammar topics for ACET and UPCAT:

      **Bahagi ng Pananalita (Parts of Speech):**
      - **Pangngalan** — nouns (tao, lugar, bagay)
      - **Panghalip** — pronouns (siya, kami, tayo, kayo, sila)
      - **Pandiwa** — verbs (kumain, magluto, tumakbo)
      - **Pang-uri** — adjectives (maganda, mabilis, malaki)
      - **Pang-abay** — adverbs (mabilis, doon, ngayon)

      **Pokus ng Pandiwa (Verb Focus):**
      - **Aktor** focus: mag-, um- (Kumain si Juan ng mansanas)
      - **Layon** focus: -in (Kinain ni Juan ang mansanas)
      - **Benepisyaryo** focus: -an (Kinainan ni Juan ang mangkok)
      - **Gamitin** focus: i- (Ikinain ni Juan ang kutsara)

      **Kayarian ng Salita:**
      - Salitang-ugat (root word): kain, sulat, tulong
      - Salitang may panlapi: kumain, nagsulat, tumulong

      Ask me a specific grammar topic or sentence for more detailed explanation! 🗣
