bot_id: id-doctor
name: DokterAI
tagline: "Informasi kesehatan terpercaya berbasis AI untuk Indonesia"

country:
  code: ID
  name: Indonesia
  language: id
  timezone: Asia/Jakarta
  currency: IDR

niche:
  type: doctor
  category: health
  requires_disclaimer: true
  disclaimer_type: medical_not_advice

llm:
  free_tier: gemini-2.0-flash
  paid_tier: gpt-4o-mini
  fallback: ollama/llama3.2:3b
  max_context_tokens: 4096
  temperature: 0.2
  knowledge_base: knowledge/

pricing:
  free:
    questions_per_day: 3
    features:
      - basic_answers
  basic:
    price_usd: 7.0
    price_local: 112000
    questions_per_day: 30
    features:
      - basic_answers
      - symptom_checker
      - chat_history
  pro:
    price_usd: 15.0
    price_local: 240000
    questions_per_day: unlimited
    features:
      - all
      - priority
      - document_upload

payment:
  stripe: false
  local_providers:
    - xendit
    - midtrans
    - gopay
  telegram_stars: true

telegram:
  bot_token: "${ID_DOCTOR_BOT_TOKEN}"
  bot_username: DokterAI_bot
  welcome_message: |
    🇮🇩 Halo! Saya DokterAI — asisten informasi kesehatan berbasis AI.
    Saya bisa membantu menjawab pertanyaan kesehatan, gejala umum,
    penggunaan obat, dan kapan harus ke dokter.

    🏥 Penting: Saya bukan dokter sungguhan. Untuk kondisi darurat
    atau serius, segera hubungi dokter atau IGD rumah sakit.
    Darurat: 119 (ambulans nasional)

    Tanya apa saja tentang kesehatan! 👇

website:
  domain: dokterai.id
  template: chat-landing
  primary_color: "#2980b9"
  logo: assets/dokterai-logo.svg

seo:
  title: "DokterAI - Informasi Kesehatan AI | Indonesia"
  description: "Tanya gejala, penyakit, obat, dan tips kesehatan kepada AI. Informasi medis terpercaya untuk Indonesia. Gratis."
  keywords:
    - informasi kesehatan online
    - cek gejala online indonesia
    - konsultasi kesehatan ai
    - tanya dokter online gratis
    - gejala penyakit indonesia

marketing:
  target_groups:
    - "telegram: grup kesehatan indonesia"
    - "facebook: komunitas ibu indonesia"
    - "tiktok: konten kesehatan dan tips hidup sehat"
  launch_offer: "7 hari gratis paket Basic"
