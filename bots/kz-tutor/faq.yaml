questions:

  - id: ent_subjects
    q: "Какие предметы входят в ЕНТ?"
    a: |
      📋 **Состав ЕНТ 2026:**

      **Обязательные предметы (все сдают):**
      • Математическая грамотность — 45 мин, 15 вопросов
      • История Казахстана — 45 мин, 30 вопросов
      • Грамотность чтения (на языке обучения) — 45 мин, 20 вопросов

      **Профильные предметы (2 на выбор по специальности):**
      • Математика, Физика, Химия, Биология
      • История, География, Мировая история
      • Информатика, Иностранный язык и др.

      Максимальный балл: 140 (15+30+20+45+30 — зависит от профиля).
      Проходной балл в топ-университеты: обычно 100+.

  - id: ent_math_topics
    q: "Что нужно знать по математике для ЕНТ?"
    a: |
      📐 **Математика ЕНТ — ключевые темы:**

      **Алгебра:**
      • Квадратные и дробно-рациональные уравнения
      • Системы уравнений (подстановка, сложение)
      • Степени и логарифмы (log, ln, 10^x)
      • Прогрессии (арифметическая, геометрическая)

      **Функции:**
      • Линейная, квадратичная, показательная, логарифмическая
      • Тригонометрия: sin, cos, tg, формулы приведения
      • Область определения и значений

      **Геометрия:**
      • Планиметрия: треугольники, четырёхугольники, окружность
      • Стереометрия: куб, параллелепипед, пирамида, конус, цилиндр, шар
      • Координатная плоскость

      **Комбинаторика и вероятность:**
      • Перестановки, размещения, сочетания
      • Классическая вероятность

      Совет: больше всего баллов дают алгебра и функции. Начинай с них!

  - id: ent_history_topics
    q: "Какие темы по истории Казахстана чаще всего встречаются в ЕНТ?"
    a: |
      🏛 **История Казахстана ЕНТ — топ тем:**

      **Древность и средневековье:**
      • Сакские племена, Усуни, Гунны
      • Тюркские каганаты (VI-VIII вв)
      • Монгольское нашествие, Золотая Орда

      **Казахское ханство (XV-XVIII вв):**
      • Основание ханства — Керей и Жаныбек (1465 г)
      • Три жуза: Старший, Средний, Младший
      • Абылай-хан — объединитель казахских земель

      **Присоединение к России (XIX в):**
      • Присоединение трёх жузов (1731-1848)
      • Восстания Срыма Датова, Кенесары Касымова
      • Реформы 1867-1868 годов

      **XX век:**
      • Алаш Орда (1917-1920)
      • Коллективизация и голод 1930-х (Ашаршылык)
      • Великая Отечественная война, казахстанцы-герои
      • Период Кунаева, целина

      **Независимость (1991 — настоящее):**
      • 16 декабря 1991 — День Независимости
      • Конституция 1995 года
      • Перенос столицы в Астану (1997)

  - id: ent_physics_topics
    q: "Что входит в физику ЕНТ?"
    a: |
      ⚡ **Физика ЕНТ — основные разделы:**

      **Механика (самый большой раздел):**
      • Кинематика: скорость, ускорение, равномерное/равноускоренное движение
      • Динамика: законы Ньютона, сила трения, сила упругости
      • Законы сохранения: импульс, энергия
      • Гравитация: закон Всемирного тяготения

      **Молекулярная физика и термодинамика:**
      • Идеальный газ, газовые законы (Бойль-Мариотт, Гей-Люссак, Шарль)
      • Теплообмен, теплоёмкость, плавление, кипение

      **Электричество и магнетизм:**
      • Закон Кулона, электрическое поле
      • Постоянный ток: закон Ома, мощность, КПД
      • Последовательное и параллельное соединение
      • Магнитное поле, электромагнитная индукция

      **Оптика:**
      • Законы отражения и преломления
      • Линзы: выпуклая, вогнутая. Формула линзы
      • Интерференция и дифракция (базово)

      **Атомная физика:**
      • Строение атома, радиоактивность
      • Ядерные реакции (базово)

  - id: how_to_prepare_ent
    q: "Как лучше всего подготовиться к ЕНТ?"
    a: |
      📚 **План подготовки к ЕНТ:**

      **За 3-6 месяцев:**
      1. Пройди все темы по плану (не жди "вдохновения")
      2. Делай по 20-30 тестовых заданий в день
      3. Разбирай КАЖДУЮ ошибку — не просто смотри ответ

      **За 1-3 месяца:**
      4. Решай варианты прошлых лет (2023-2025)
      5. Фокус на слабых темах, а не на сильных
      6. Время решения: тренируй скорость (каждый вопрос ~1-1.5 мин)

      **За 1-2 недели:**
      7. Повтори формулы и даты — никакой новой теории
      8. Спи достаточно, не занимайся ночами перед экзаменом

      **Ресурсы:**
      • testent.kz — официальные пробные варианты ЕНТ
      • Bilim.land — видеоуроки по казахстанской программе
      • Я (BilimBot) — разбор любого вопроса прямо здесь! 😊

      Какой предмет хочешь начать? Математику, историю или физику?

  - id: ent_score_universities
    q: "Сколько баллов нужно для поступления в КазНУ, Назарбаев Университет?"
    a: |
      🎓 **Проходные баллы в вузы Казахстана (ориентир 2025):**

      **Назарбаев Университет:**
      • ЕНТ обычно не требуется — своя вступительная программа (NU EST)
      • Английский язык (IELTS/TOEFL), портфолио, интервью
      • Гранты: 100% конкурентные

      **КазНУ им. аль-Фараби (Алматы):**
      • Технические специальности: 95-110 баллов
      • Естественные науки: 85-100 баллов
      • Гуманитарные: 80-95 баллов
      • Грант: от 95-100 (зависит от специальности и года)

      **КБТУ, Satbayev University, КИМЭП:**
      • Грант: 95-115 баллов
      • Платное: от 70 баллов

      **Региональные университеты:**
      • Грант: от 65-80 баллов

      ⚠️ Баллы меняются каждый год! Следи за официальным сайтом МОН РК (edu.gov.kz).
      Стремись к 100+ — это твой гарантированный шанс на грант!
