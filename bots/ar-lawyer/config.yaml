bot_id: ar-lawyer
name: AbogadoAR
tagline: "Tu asistente legal con inteligencia artificial para Argentina"

country:
  code: AR
  name: Argentina
  language: es-AR
  timezone: America/Argentina/Buenos_Aires
  currency: ARS

niche:
  type: lawyer
  category: legal
  requires_disclaimer: true
  disclaimer_type: legal_not_advice

llm:
  free_tier: gemini-2.0-flash
  paid_tier: gpt-4o-mini
  fallback: ollama/llama3.2:3b
  max_context_tokens: 4096
  temperature: 0.3
  knowledge_base: "knowledge/"

pricing:
  free:
    questions_per_day: 3
    features: ["basic_answers"]
  basic:
    price_usd: 9
    price_local: 9000
    questions_per_day: 30
    features: ["basic_answers", "document_templates", "chat_history"]
  pro:
    price_usd: 19
    price_local: 19000
    questions_per_day: unlimited
    features: ["all", "document_upload", "priority", "api_access"]

payment:
  stripe: false
  local_providers: ["mercado_pago"]
  telegram_stars: true

telegram:
  bot_token: "${AR_LAWYER_BOT_TOKEN}"
  bot_username: "AbogadoAR_bot"
  welcome_message: |
    🇦🇷 ¡Hola! Soy AbogadoAR, tu asistente legal con IA para Argentina.
    Puedo ayudarte con dudas sobre derecho civil, laboral, del consumidor,
    familia y mucho más según la legislación argentina.

    ⚖️ Importante: No soy abogado. Mis respuestas son informativas
    y no reemplazan una consulta profesional con un abogado matriculado.

    ¡Preguntame lo que necesites! 👇

website:
  domain: "smarthelp.ai/ar/lawyer"
  template: "chat-landing"
  primary_color: "#74ACDF"
  secondary_color: "#F6B40E"

seo:
  title: "AbogadoAR - Asistente Legal con IA para Argentina"
  description: "Consulta legal gratuita con inteligencia artificial. Derecho civil, laboral, consumidor según el Código Civil y Comercial argentino."
  keywords: ["abogado ia argentina", "consulta legal online argentina", "codigo civil comercial", "derecho laboral argentina"]

marketing:
  target_groups:
    - "telegram: grupos de derecho y leyes argentina"
    - "facebook: emprendedores argentina, autónomos"
    - "reddit: r/argentina, r/asesorialegal"
  launch_offer: "7 días gratis del plan Basic"
