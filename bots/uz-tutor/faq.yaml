- question: "DTM imtihoniga tayyorgarlik qancha vaqt oladi?"
  answer: "O'rtacha 6-12 oy intensiv tayyorgarlik tavsiya etiladi. Kuchli tomonlaringizga qarab, matematik va tabiiy fanlar bo'yicha haftasiga 15-20 soat tayyorgarlik ko'rish yetarli. Eng muhim predmetlar: matematika, fizika (texnik yo'nalishlar uchun) yoki biologiya (tibbiyot uchun), ona tili va ingliz tili."

- question: "DTM da qanday fanlar sinalmadi?"
  answer: "DTM uchta blokdan iborat: 1) Majburiy fanlar — Ona tili va adabiyot, Matematika, Tarix; 2) Yo'nalish bo'yicha fanlar — tanlangan mutaxassislikka qarab 2 ta fan (masalan, fizika + kimyo, biologiya + kimyo va h.k.); 3) Ixtiyoriy — Ingliz/Rus/Nemis/Fransuz tili (ball oshirish uchun)."

- question: "Matematikada qanday mavzular ko'proq chiqadi?"
  answer: "DTM matematikasida eng ko'p uchraydigan mavzular: Algebraik ifodalar va tenlamalar (25%), Funksiyalar va grafiklar (20%), Geometriya (20%), Trigonometriya (15%), Logarifm va darajalar (10%), Kombinatorika va ehtimollik (10%). Har bir mavzu bo'yicha amaliy masalalar ishlang."

- question: "Ingliz tilidan DTM da nechta ball olish kerak?"
  answer: "Ixtiyoriy ingliz tili testi 30 ta savoldan iborat, har biri 1,1 ball. Maksimum 33 qo'shimcha ball olish mumkin. A2-B1 darajasi odatda 15-20 ball, B2 darajasi 25+ ball olish imkonini beradi. Bu qo'shimcha balllar asosiy yo'nalish balllariga qo'shiladi."

- question: "O'zbekiston tarixi fanidan qanday tayyorgarlik ko'rish kerak?"
  answer: "O'zbekiston tarixi 3 qismga bo'linadi: Qadimgi davr (eng qadimgi zamonlardan XVI asrgacha), Yangi davr (XVI-XX asr boshlari), Zamonaviy tarix (sovet davri va mustaqillik). Eng ko'p savollar Mustaqillik davri, Sovet davri va Temuriylar davridan tushadi. DTM spetsifikatsiyasini albatta o'qing."

- question: "Referat yozishda asosiy qoidalar qanday?"
  answer: "Maktab referati uchun: hajmi 10-15 bet (A4, 14 shrift, 1,5 interval), kirish (1-2 bet), asosiy qism (3-4 bo'lim), xulosa (1-2 bet), foydalanilgan adabiyotlar ro'yxati. Plagiat bo'lmasligi uchun manba ko'rsatilgan iqtiboslardan foydalaning va o'z fikringizni ifodalang."
