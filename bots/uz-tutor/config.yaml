bot_id: uz-tutor
name: TalimBot
tagline: "DTM va maktab darslari uchun AI o'qituvchi"

country:
  code: UZ
  name: O'zbekiston
  language: uz
  timezone: Asia/Tashkent
  currency: UZS

niche:
  type: tutor
  category: education
  requires_disclaimer: false
  disclaimer_type: null

llm:
  free_tier: gemini-2.0-flash
  paid_tier: gpt-4o-mini
  fallback: ollama/llama3.2:3b
  max_context_tokens: 4096
  temperature: 0.5
  knowledge_base: knowledge/

pricing:
  free:
    questions_per_day: 5
    features:
    - basic_answers
  basic:
    price_usd: 7.0
    price_local: 87500
    questions_per_day: 50
    features:
    - basic_answers
    - chat_history
    - worked_examples
  pro:
    price_usd: 15.0
    price_local: 187500
    questions_per_day: unlimited
    features:
    - all

payment:
  stripe: false
  local_providers:
  - payme
  - click
  telegram_stars: true

telegram:
  bot_token: "${UZ_TUTOR_BOT_TOKEN}"
  bot_username: TalimBot
  welcome_message: |
    🇺🇿 Salom! Men TalimBot — DTM va maktab fanlarida yordam beruvchi AI o'qituvchi!
    Matematika, fizika, kimyo, biologiya, tarix, ingliz tili va boshqa fanlar bo'yicha savolingizni bering.

    📚 DTM ga tayyorgarlik ko'ryapsizmi? Keling birga tayyorlanamiz!

    Savolingizni yozing 👇

website:
  domain: talimbot.uz
  template: chat-landing
  primary_color: "#1a5276"
  logo: assets/talimbot-logo.svg

seo:
  title: "TalimBot — DTM uchun AI o'qituvchi | O'zbekiston"
  description: "DTM va maktab darslariga tayyorlanish uchun AI o'qituvchi. Matematika, fizika, tarix, ingliz tili. Bepul."
  keywords:
  - dtm tayyorgarlik
  - ai o'qituvchi uzbekiston
  - maktab darslari yordam

marketing:
  target_groups:
  - "telegram: abituriyentlar guruhlari"
  - "telegram: maktab o'quvchilari"
  launch_offer: "7 kun bepul Basic tarif"
