version: "3.8"
services:
  api:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://smarthelp:smarthelp2026@db:5432/smarthelp
    volumes:
      - ./bots:/app/bots
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=smarthelp
      - POSTGRES_USER=smarthelp
      - POSTGRES_PASSWORD=smarthelp2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
